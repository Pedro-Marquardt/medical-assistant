services:
  chroma:
    image: chromadb/chroma:1.1.0
    container_name: medical-assistant-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    networks:
      - medical-assistant-network

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: medical-assistant-api
    ports:
      - "3030:3030"
    volumes:
      - ./app:/app
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - MCP_HOST=mcp-server
      - MCP_PORT=8000
      - HOST_OLLAMA=http://host.docker.internal:11434
    depends_on:
      - chroma
      - mcp-server
    networks:
      - medical-assistant-network

  mcp-server:
    build:
      context: ./app/mcp-server
      dockerfile: Dockerfile
    container_name: medical-assistant-mcp
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    networks:
      - medical-assistant-network

volumes:
  chroma_data:

networks:
  medical-assistant-network:
    driver: bridge